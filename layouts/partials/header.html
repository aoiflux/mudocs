<header class="site-header">
  <div class="site-header-inner">
    <a class="brand" href="/">
      <span class="brand-mark">μ</span>
      <span class="brand-text">{{ .Site.Title }}</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>

baseURL = "https://mudocs.netlify.app/"
title = "μdocs"
defaultContentLanguage = "en"
ignoreLogs = ['warning-goldmark-raw-html']

[params]
description = "Adapted Mutant documentation with a manual freshness workflow and canonical source links."
hero_title = "Mutant documentation, redesigned for clarity."
hero_subtitle = "Task-first guides, canonical references, and a manual freshness workflow for the latest stable release."
############################# Default Parameters ##########################
# logo is for all page
logo = ""
# logo white is for homepage logo, you can use colorful logo too...
logo_white = ""
# when logo is empty, it will shown your site title

# customize color
primary_color = "#5feff9"
body_color = "#361a99"
text_color = "#8ca4b4"
text_color_dark = "#ffffff"
white_color = "#171b42"
light_color = "#361a99"

# font family
font_family = "manrope" # Choose font family from : https://fonts.google.com/

################################ English Language ######################
[Languages.en]
weight = 1
locale = "en-US"

# banner
[Languages.en.params.banner]
title = "μdocs for mutant"
subtitle = "mutant is an open source programming language whose aim is to provide an accessible, secure way for programming & security research."
bg_image = "images/banner.jpeg"

# call to action
[Languages.en.params.cta]
enable = true
title = "Download latest binaries here"
content = "Official compiled binaries are available for: Linux, macOS, & Windows"

# call to action button
[Languages.en.params.cta.button]
enable = true
label = "Download"
link = "https://github.com/aoiflux/mutant/releases"



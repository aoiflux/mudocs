{{ define "main" }}
  <section class="section-hero">
    <p class="eyebrow">Taxonomy</p>
    <h1>{{ .Title }}</h1>
  </section>

  <section class="content-list">
    {{ range .Pages.ByTitle }}
      <article class="content-card">
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
        <p>{{ .Summary }}</p>
      </article>
    {{ end }}
  </section>
{{ end }}
